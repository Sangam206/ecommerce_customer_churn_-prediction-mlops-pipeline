version: "3.9"

services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.0
    container_name: mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow/mlruns
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlruns/mlflow.db
      --default-artifact-root /mlflow/mlruns
      --host 0.0.0.0
      --port 5000
    networks:
      - astro_network

volumes:
  mlflow_data:

networks:
  astro_network:
    external: true
    name: ecommerce-customer-churn--prediction-mlops-pipeline_43bb99_airflow
